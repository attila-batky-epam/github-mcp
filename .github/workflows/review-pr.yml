name: Auto Review PR

on:
  pull_request:
    types: [opened]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Get full history for proper diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Review PR and post comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # Get the diff for this PR
          git fetch origin $BASE_REF
          DIFF=$(git diff origin/$BASE_REF...HEAD)

          # Create review script
          cat > review-and-comment.js << 'SCRIPT_EOF'
          #!/usr/bin/env node

          import { spawn } from 'child_process';
          import { fileURLToPath } from 'url';
          import { dirname, join } from 'path';

          const __filename = fileURLToPath(import.meta.url);
          const __dirname = dirname(__filename);

          const prNumber = parseInt(process.env.PR_NUMBER);
          const owner = process.env.REPO_OWNER;
          const repo = process.env.REPO_NAME;

          // Read diff from stdin
          let diffContent = '';
          process.stdin.on('data', (chunk) => {
            diffContent += chunk.toString();
          });

          process.stdin.on('end', async () => {
            const mcp = spawn('node', [join(__dirname, 'src', 'index.js')], {
              stdio: ['pipe', 'pipe', 'inherit']
            });

            let responseBuffer = '';

            mcp.stdout.on('data', (data) => {
              responseBuffer += data.toString();
              const lines = responseBuffer.split('\n');
              responseBuffer = lines.pop() || '';

              for (const line of lines) {
                if (line.trim()) {
                  try {
                    const response = JSON.parse(line);
                    if (response.result?.content?.[0]?.text) {
                      console.log('Success:', response.result.content[0].text);
                    }
                  } catch (e) {
                    // Ignore non-JSON output
                  }
                }
              }
            });

            // Initialize
            mcp.stdin.write(JSON.stringify({
              jsonrpc: '2.0',
              id: 1,
              method: 'initialize',
              params: {
                protocolVersion: '2024-11-05',
                capabilities: {},
                clientInfo: { name: 'gh-actions-reviewer', version: '1.0.0' }
              }
            }) + '\n');

            // Wait a bit for init, then post comment
            setTimeout(() => {
              // Generate review based on diff stats
              const stats = analyzeDiff(diffContent);
              const review = generateReview(stats, diffContent);

              mcp.stdin.write(JSON.stringify({
                jsonrpc: '2.0',
                id: 2,
                method: 'tools/call',
                params: {
                  name: 'comment_on_pr',
                  arguments: {
                    owner,
                    repo,
                    pr_number: prNumber,
                    body: review
                  }
                }
              }) + '\n');

              setTimeout(() => {
                mcp.stdin.end();
                setTimeout(() => process.exit(0), 1000);
              }, 3000);
            }, 1000);
          });

          function analyzeDiff(diff) {
            const lines = diff.split('\n');
            const stats = {
              filesChanged: new Set(),
              additions: 0,
              deletions: 0,
              hasTests: false,
              hasDocChanges: false
            };

            for (const line of lines) {
              if (line.startsWith('diff --git')) {
                const match = line.match(/b\/(.*?)$/);
                if (match) stats.filesChanged.add(match[1]);
              }
              if (line.startsWith('+') && !line.startsWith('+++')) stats.additions++;
              if (line.startsWith('-') && !line.startsWith('---')) stats.deletions++;
              if (line.includes('test.js') || line.includes('.test.') || line.includes('.spec.')) {
                stats.hasTests = true;
              }
              if (line.includes('README') || line.includes('.md')) {
                stats.hasDocChanges = true;
              }
            }

            return {
              filesChanged: Array.from(stats.filesChanged),
              additions: stats.additions,
              deletions: stats.deletions,
              hasTests: stats.hasTests,
              hasDocChanges: stats.hasDocChanges
            };
          }

          function generateReview(stats, diff) {
            let review = '## 🤖 Automated Code Review\n\n';
            review += '### 📊 Change Summary\n';
            review += `- **Files changed:** ${stats.filesChanged.length}\n`;
            review += `- **Lines added:** +${stats.additions}\n`;
            review += `- **Lines removed:** -${stats.deletions}\n`;
            review += `- **Net change:** ${stats.additions - stats.deletions > 0 ? '+' : ''}${stats.additions - stats.deletions}\n\n`;

            review += '### 📝 Modified Files\n';
            stats.filesChanged.forEach(file => {
              review += `- \`${file}\`\n`;
            });
            review += '\n';

            review += '### ✅ Checks\n';
            review += stats.hasTests ? '- ✅ Test files included\n' : '- ⚠️ No test files detected\n';
            review += stats.hasDocChanges ? '- ✅ Documentation updated\n' : '- ℹ️ No documentation changes\n';
            review += '\n';

            if (stats.deletions > stats.additions * 2) {
              review += '### 🎉 Cleanup PR\n';
              review += 'This PR removes more code than it adds - nice cleanup work!\n\n';
            }

            review += '---\n';
            review += '*This review was automatically generated by the GitHub MCP server*';

            return review;
          }
          SCRIPT_EOF

          chmod +x review-and-comment.js
          echo "$DIFF" | node review-and-comment.js
